kind = "web"
previewPath = "/"
title = "Harmony Spa & Massage"
version = "1.0.0"
id = "artifacts/harmony-spa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22349

[services.development]
run = "pnpm --filter @workspace/harmony-spa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/harmony-spa", "run", "build" ]
publicDir = "artifacts/harmony-spa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22349"
BASE_PATH = "/"
